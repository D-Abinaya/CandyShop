<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📍 Delivery Address</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="topbar">
  <div class="brand">🍭 Sweet Bites</div>
  <div class="nav-links"><a href="cart.html">← Cart</a></div>
</nav>
<div class="steps">
  <div class="step done"><div class="step-dot">✓</div><div class="step-label">Shop</div></div>
  <div class="step-line done"></div>
  <div class="step done"><div class="step-dot">✓</div><div class="step-label">Cart</div></div>
  <div class="step-line done"></div>
  <div class="step active"><div class="step-dot">3</div><div class="step-label">Address</div></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-dot">4</div><div class="step-label">Bill</div></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-dot">5</div><div class="step-label">Pay</div></div>
</div>
<div class="form-card">
  <h2>📍 Delivery Address</h2>
  <p class="sub">Where should we drop your sweet treats?</p>
  <label class="form-label">Full Name</label>
  <input id="dname" type="text" placeholder="Your full name">
  <label class="form-label">Phone Number</label>
  <input id="dphone" type="text" placeholder="9876543210">
  <label class="form-label">Street Address</label>
  <input id="addr" type="text" placeholder="Door no, Street, Area">
  <label class="form-label">City & Pincode</label>
  <input id="dcity" type="text" placeholder="Chennai — 600001">
  <button class="btn-full" style="margin-top:20px" onclick="placeOrder()">Continue to Bill 🧾</button>
</div>
<script src="script.js"></script>
</body>
</html>
